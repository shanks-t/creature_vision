apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: grafana-config
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-provisioning
          mountPath: /etc/grafana/provisioning
        - name: grafana-dashboards
          mountPath: /etc/grafana/dashboards
        - name: bigquery-pem
          mountPath: /etc/grafana/bigquery.pem
          subPath: bigquery.pem
          readOnly: true
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-storage
      - name: grafana-provisioning
        hostPath:
          path: /monitoring/grafana/provisioning
          type: Directory
      - name: grafana-dashboards
        hostPath:
          path: /monitoring/grafana/provisioning/dashboards
          type: Directory
      - name: bigquery-pem
        secret:
          secretName: bigquery-pem
          items:
          - key: bigquery.pem
            path: bigquery.pem